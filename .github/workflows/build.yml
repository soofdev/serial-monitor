name: Build Installers

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: serial-monitor-windows
          - platform: macos-latest
            artifact-name: serial-monitor-macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Ad-hoc sign macOS app and re-create DMG
        if: matrix.platform == 'macos-latest'
        run: |
          # Sign the .app bundle
          APP=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          codesign --force --deep --sign - "$APP"
          # Re-create the DMG with the signed app
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          APPNAME=$(basename "$APP")
          DMGNAME=$(basename "$DMG")
          TMPDIR=$(mktemp -d)
          hdiutil create -size 100m -fs HFS+ -volname "${APPNAME%.app}" "$TMPDIR/temp.dmg"
          hdiutil attach "$TMPDIR/temp.dmg" -mountpoint "$TMPDIR/mnt"
          cp -R "$APP" "$TMPDIR/mnt/"
          ln -s /Applications "$TMPDIR/mnt/Applications"
          hdiutil detach "$TMPDIR/mnt"
          rm -f "$DMG"
          hdiutil convert "$TMPDIR/temp.dmg" -format UDZO -o "$DMG"
          rm -rf "$TMPDIR"

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/release/bundle -type f | head -50

      - name: Upload macOS DMG
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload Windows NSIS installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload Windows MSI installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload macOS release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
